# Docker SSH Connection Reliability
# Place this file in /etc/ssh/sshd_config.d/ on your SSH server
# and restart sshd: sudo systemctl restart sshd

# MaxStartups: Controls connection throttling
# Format: start:rate:full (default: 10:30:100)
# - 10: start dropping connections after 10 unauthenticated connections
# - 30: drop 30% of additional connections
# - 100: hard limit of 100 unauthenticated connections
# Docker opens many connections rapidly; the default causes random failures.
MaxStartups 100

# MaxSessions: Maximum multiplexed sessions per TCP connection (default: 10)
# Docker with ControlMaster multiplexing can hit this limit quickly.
MaxSessions 100
