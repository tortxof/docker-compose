networks:
  web:
  valkey:
    external: true
    name: valkey
  postgres:
    external: true
    name: postgres

volumes:
  docker_certs:

services:
  cloudflared:
    restart: unless-stopped
    image: cloudflare/cloudflared:latest
    networks:
      - web
    env_file: cloudflared.env
    command: tunnel --no-autoupdate run

  ha-proxy:
    image: alpine/socat
    restart: unless-stopped
    networks:
      - web
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: "TCP4-LISTEN:8080,fork,reuseaddr,keepalive TCP:host.docker.internal:8123"

  searxng:
    image: ghcr.io/searxng/searxng:2026.4.17-e8299a4c3
    restart: unless-stopped
    networks:
      - web
      - valkey
    environment:
      SEARXNG_BASE_URL: "https://search.djones.co/"
      SEARXNG_VALKEY_URL: "valkey://valkey:6379/1"
    volumes:
      - /evil_engine/docker-volumes/searxng/config:/etc/searxng
      - /evil_engine/docker-volumes/searxng/cache:/var/cache/searxng

  forgejo:
    image: codeberg.org/forgejo/forgejo:14.0.4
    restart: unless-stopped
    networks:
      - web
    env_file: forgejo.env
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      FORGEJO__server__ROOT_URL: "https://forgejo.djones.co/"
      FORGEJO__server__START_SSH_SERVER: "false"
      FORGEJO__server__SSH_DOMAIN: "git.djones.co"
      FORGEJO__server__SSH_PORT: "222"
      FORGEJO__server__SSH_LISTEN_PORT: "22"
      FORGEJO__openid__ENABLE_OPENID_SIGNIN: "false"
      FORGEJO__openid__ENABLE_OPENID_SIGNUP: "false"
      FORGEJO__ssh.minimum_key_sizes__RSA: "2048"
      FORGEJO__mailer__ENABLED: "true"
      FORGEJO__mailer__SMTP_ADDR: "smtp.mailgun.org"
      FORGEJO__mailer__SMTP_PORT: "587"
      FORGEJO__mailer__USER: "forgejo@djones.co"
    volumes:
      - /evil_engine/docker-volumes/forgejo:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "222:22"

  runner-dind:
    image: data.forgejo.org/oci/docker:dind
    hostname: docker
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: /certs
      DOCKER_HOST: runner-dind
    volumes:
      - docker_certs:/certs

  runner:
    image: "data.forgejo.org/forgejo/runner:12"
    links:
      - runner-dind
    depends_on:
      runner-dind:
        condition: service_started
    environment:
      DOCKER_HOST: tcp://docker:2376
      DOCKER_CERT_PATH: /certs/client
      DOCKER_TLS_VERIFY: "1"
    user: 1002:1002
    volumes:
      - /evil_engine/docker-volumes/forgejo-runner:/data
      - docker_certs:/certs
    restart: "unless-stopped"
    command: '/bin/sh -c "sleep 5; forgejo-runner daemon --config config.yml"'

  enclosed:
    restart: unless-stopped
    image: ghcr.io/corentinth/enclosed:latest
    networks:
      - web
    volumes:
      - /evil_engine/docker-volumes/enclosed:/app/.data
    environment:
      SERVER_API_ROUTES_TIMEOUT_MS: "30000"
      PUBLIC_DEFAULT_DELETE_NOTE_AFTER_READING: "true"
      PUBLIC_IS_SETTING_NO_EXPIRATION_ALLOWED: "false"
      SERVER_CORS_ORIGINS: "https://enclosed.djones.co"
    env_file: enclosed.env

  linkding:
    image: sissbruecker/linkding:latest
    restart: unless-stopped
    networks:
      - web
    volumes:
      - "/evil_engine/docker-volumes/linkding:/etc/linkding/data"
    env_file: linkding.env

  gollum:
    restart: unless-stopped
    image: gollumwiki/gollum:6.1.0
    networks:
      - web
    user: "1000:1000"
    volumes:
      - /evil_engine/docker-volumes/txfwiki.git:/data.git
    command: --h1-title --allow-uploads dir --emoji --bare /data.git

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    restart: unless-stopped
    networks:
      - web
    environment:
      WEBUI_URL: "https://ai.djones.co"
      WEBUI_AUTH_TRUSTED_EMAIL_HEADER: "Cf-Access-Authenticated-User-Email"
      BYPASS_MODEL_ACCESS_CONTROL: "True"
      OLLAMA_BASE_URL: "http://192.168.10.4:11434"
    env_file: open-webui.env
    volumes:
      - type: bind
        source: /evil_engine/docker-volumes/open-webui
        target: /app/backend/data

  rc-club-members:
    restart: unless-stopped
    image: public.ecr.aws/m3l3l1j4/rc-club-members-2@sha256:b889552f089e19bd6e073bea35afa741b5a1eaaf411ffdb046683a961db14c54
    networks:
      - web
    environment:
      APP_DEBUG: "false"
      APP_TIME_ZONE: "America/New_York"
      APP_ORIGIN: "https://members.bsrcc.com"
      APP_NAME: "Black Sheep RC Club"
      APP_SHORT_NAME: "BSRCC"
      MAILGUN_DOMAIN: "bsrcc.com"
      MAILGUN_URL: "https://api.mailgun.net/v3/bsrcc.com/messages"
      NOREPLY_EMAIL: "noreply@bsrcc.com"
      DEFAULT_FROM_EMAIL_USER: "daniel"
      ALLOWED_HOSTS: '["members.bsrcc.com"]'
      CSRF_TRUSTED_ORIGINS: '["https://members.bsrcc.com"]'
      DATABASE_PATH: "/data/db.sqlite3"
    env_file: rc-club-members.env
    volumes:
      - /evil_engine/docker-volumes/rc-club-members:/data

  flask-password:
    restart: unless-stopped
    image: public.ecr.aws/m3l3l1j4/flask-password@sha256:1e368171ebcb2af2019a4189a26d964111689179b9b36a2e89266ae730001369
    networks:
      - web
      - postgres
    environment:
      FLASK_DEBUG: "false"
      PG_HOST: "postgres"
    env_file: flask-password.env

  flask-imghost:
    restart: unless-stopped
    image: public.ecr.aws/m3l3l1j4/flask-imghost@sha256:9887fe0798085e4e92f23093524ac4ddd34ee3011047ecd093f1abbad31de4e5
    networks:
      - web
      - postgres
    environment:
      FLASK_DEBUG: "false"
      S3_BUCKET: "djones-imghost"
      BUCKET_CDN: '{"djones-imghost": "https://imghost-cdn.djones.co"}'
      PG_HOST: "postgres"
    env_file: flask-imghost.env

  it-tools:
    restart: unless-stopped
    image: ghcr.io/corentinth/it-tools:latest
    networks:
      - web

  matrix-portal-server:
    build: "https://github.com/tortxof/matrix-portal-server.git#main"
    networks:
      - web
    restart: unless-stopped
    ports:
      - "5000:5000"

  gotime:
    build: "https://github.com/tortxof/gotime.git#main"
    restart: unless-stopped
    networks:
      - web

  www-time:
    build: "https://github.com/tortxof/www-time.git#main"
    networks:
      - web
    restart: unless-stopped

  scrutiny:
    restart: unless-stopped
    image: ghcr.io/analogj/scrutiny:master-omnibus
    networks:
      - web
    cap_add:
      - SYS_RAWIO
    env_file: scrutiny.env
    volumes:
      - /run/udev:/run/udev:ro
      - /evil_engine/docker-volumes/scrutiny/config:/opt/scrutiny/config
      - /evil_engine/docker-volumes/scrutiny/influxdb:/opt/scrutiny/influxdb
    devices:
      - "/dev/nvme0n1"
      - "/dev/sda"
      - "/dev/sdb"
      - "/dev/sdc"
      - "/dev/sdd"
      - "/dev/sde"
